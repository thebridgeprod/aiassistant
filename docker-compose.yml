version: "3.8"

services:
  signal:
    image: bbernhard/signal-cli-rest-api:latest
    environment:
      - MODE=native
    volumes:
      - signal-data:/home/.local/share/signal-cli
    ports:
      - "8080:8080"
    restart: unless-stopped

  server:
    build: .
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - PC_APP_ID=${PC_APP_ID}
      - PC_SECRET=${PC_SECRET}
      - MY_PHONE=${MY_PHONE_NUMBER}
      - SIGNAL_NUMBER=${SIGNAL_NUMBER}
      - SIGNAL_API=http://signal:8080
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      - signal
    restart: unless-stopped

volumes:
  signal-data:
